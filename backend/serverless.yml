service: eligify-backend

frameworkVersion: '3'

provider:
  name: aws
  runtime: python3.11
  region: ${opt:region, 'us-east-1'}
  stage: ${opt:stage, 'dev'}
  memorySize: 512
  timeout: 30
  
  environment:
    STAGE: ${self:provider.stage}
    AWS_REGION: ${self:provider.region}
    DYNAMODB_STUDENTS_TABLE: ${self:custom.studentsTable}
    DYNAMODB_SKILLS_TABLE: ${self:custom.skillsTable}
    DYNAMODB_INTERNSHIPS_TABLE: ${self:custom.internshipsTable}
    DYNAMODB_PROJECTS_TABLE: ${self:custom.projectsTable}
    DYNAMODB_VALIDATIONS_TABLE: ${self:custom.validationsTable}
    S3_RESUME_BUCKET: ${self:custom.resumeBucket}
    COGNITO_USER_POOL_ID: !Ref CognitoUserPool
    COGNITO_CLIENT_ID: !Ref CognitoUserPoolClient
    JWT_SECRET: ${env:JWT_SECRET, 'change-me-in-production'}
    BEDROCK_MODEL_ID: anthropic.claude-3-sonnet-20240229-v1:0
    OPENAI_API_KEY: ${env:OPENAI_API_KEY, ''}
    ENVIRONMENT: ${self:provider.stage}
  
  iam:
    role:
      statements:
        # DynamoDB permissions
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:BatchGetItem
            - dynamodb:BatchWriteItem
          Resource:
            - !GetAtt StudentsTable.Arn
            - !GetAtt SkillsTable.Arn
            - !GetAtt InternshipsTable.Arn
            - !GetAtt ProjectsTable.Arn
            - !GetAtt ValidationsTable.Arn
        
        # S3 permissions
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
          Resource:
            - !Sub '${ResumeBucket.Arn}/*'
        
        # Bedrock permissions
        - Effect: Allow
          Action:
            - bedrock:InvokeModel
          Resource:
            - !Sub 'arn:aws:bedrock:${self:provider.region}::foundation-model/anthropic.claude-3-sonnet-20240229-v1:0'
        
        # Cognito permissions
        - Effect: Allow
          Action:
            - cognito-idp:AdminInitiateAuth
            - cognito-idp:AdminCreateUser
            - cognito-idp:AdminSetUserPassword
            - cognito-idp:AdminGetUser
          Resource:
            - !GetAtt CognitoUserPool.Arn

custom:
  studentsTable: eligify-students-${self:provider.stage}
  skillsTable: eligify-skills-${self:provider.stage}
  internshipsTable: eligify-internships-${self:provider.stage}
  projectsTable: eligify-projects-${self:provider.stage}
  validationsTable: eligify-validations-${self:provider.stage}
  resumeBucket: eligify-resumes-${self:provider.stage}

functions:
  # Main API handler (all routes through FastAPI)
  api:
    handler: src.main.handler
    memorySize: 1024
    timeout: 30
    events:
      - http:
          path: /{proxy+}
          method: ANY
          cors: true
      - http:
          path: /
          method: ANY
          cors: true

resources:
  Resources:
    # DynamoDB Tables
    StudentsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.studentsTable}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: userId
            AttributeType: S
        KeySchema:
          - AttributeName: userId
            KeyType: HASH
        StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true
        SSESpecification:
          SSEEnabled: true
    
    SkillsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.skillsTable}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: userId
            AttributeType: S
          - AttributeName: skillId
            AttributeType: S
        KeySchema:
          - AttributeName: userId
            KeyType: HASH
          - AttributeName: skillId
            KeyType: RANGE
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true
        SSESpecification:
          SSEEnabled: true
    
    InternshipsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.internshipsTable}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: internshipId
            AttributeType: S
        KeySchema:
          - AttributeName: internshipId
            KeyType: HASH
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true
        SSESpecification:
          SSEEnabled: true
    
    ProjectsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.projectsTable}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: userId
            AttributeType: S
          - AttributeName: projectId
            AttributeType: S
        KeySchema:
          - AttributeName: userId
            KeyType: HASH
          - AttributeName: projectId
            KeyType: RANGE
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true
        SSESpecification:
          SSEEnabled: true
    
    ValidationsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.validationsTable}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: validationId
            AttributeType: S
          - AttributeName: userId
            AttributeType: S
        KeySchema:
          - AttributeName: validationId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: UserIdIndex
            KeySchema:
              - AttributeName: userId
                KeyType: HASH
            Projection:
              ProjectionType: ALL
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true
        SSESpecification:
          SSEEnabled: true
    
    # S3 Bucket for Resumes
    ResumeBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.resumeBucket}
        BucketEncryption:
          ServerSideEncryptionConfiguration:
            - ServerSideEncryptionByDefault:
                SSEAlgorithm: AES256
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true
        CorsConfiguration:
          CorsRules:
            - AllowedOrigins:
                - '*'
              AllowedMethods:
                - GET
                - PUT
                - POST
              AllowedHeaders:
                - '*'
              MaxAge: 3000
    
    # Cognito User Pool
    CognitoUserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: eligify-users-${self:provider.stage}
        UsernameAttributes:
          - email
        AutoVerifiedAttributes:
          - email
        EmailConfiguration:
          EmailSendingAccount: COGNITO_DEFAULT
        Policies:
          PasswordPolicy:
            MinimumLength: 8
            RequireUppercase: true
            RequireLowercase: true
            RequireNumbers: true
            RequireSymbols: true
        Schema:
          - Name: email
            Required: true
            Mutable: false
          - Name: name
            Required: true
            Mutable: true
    
    CognitoUserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        ClientName: eligify-client-${self:provider.stage}
        UserPoolId: !Ref CognitoUserPool
        GenerateSecret: false
        ExplicitAuthFlows:
          - ALLOW_USER_PASSWORD_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH
        AccessTokenValidity: 1
        IdTokenValidity: 1
        RefreshTokenValidity: 30
        TokenValidityUnits:
          AccessToken: hours
          IdToken: hours
          RefreshToken: days

  Outputs:
    ApiGatewayRestApiId:
      Value: !Ref ApiGatewayRestApi
      Export:
        Name: ${self:provider.stage}-ApiGatewayRestApiId
    
    ApiGatewayRestApiRootResourceId:
      Value: !GetAtt ApiGatewayRestApi.RootResourceId
      Export:
        Name: ${self:provider.stage}-ApiGatewayRestApiRootResourceId
    
    CognitoUserPoolId:
      Value: !Ref CognitoUserPool
      Export:
        Name: ${self:provider.stage}-CognitoUserPoolId
    
    CognitoUserPoolClientId:
      Value: !Ref CognitoUserPoolClient
      Export:
        Name: ${self:provider.stage}-CognitoUserPoolClientId
    
    ResumeBucketName:
      Value: !Ref ResumeBucket
      Export:
        Name: ${self:provider.stage}-ResumeBucketName

plugins:
  - serverless-python-requirements
  - serverless-offline

package:
  patterns:
    - '!node_modules/**'
    - '!venv/**'
    - '!.venv/**'
    - '!__pycache__/**'
    - '!.pytest_cache/**'
    - '!tests/**'
    - '!.git/**'

custom:
  pythonRequirements:
    dockerizePip: true
    layer: true
